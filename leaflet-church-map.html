<!DOCTYPE html>
<html>
<head>
  <title>Kings County 1864 Church Map</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin=""></script>
  <style>
    body { margin: 0; padding: 0; }
    html, body, #map { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  
var bounds = L.latLngBounds(
  L.latLng(44.7, -65.2),
  L.latLng(45.4, -63.9)
);

var map = L.map('map', {
    maxBounds: bounds,
    maxBoundsViscosity: 1.0
}).setView([45.0425, -64.513], 13);  map.setMinZoom(10);

  var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  var churchMap = L.tileLayer('{z}/{x}/{y}.png', {
    minZoom: 10,
    maxZoom: 16,
    tms: false,
    attribution: 'A.F. Church, Kings County Nova Scotia, 1864',
    opacity: 0.8,
    bounds: bounds
  }).addTo(map);

var slider = document.createElement('input');
  slider.type = 'range';
  slider.min = 0;
  slider.max = 1;
  slider.step = 0.01;
  slider.value = 0.8;
  slider.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:300px;z-index:1000;';
  document.body.appendChild(slider);

  slider.addEventListener('input', function() {
    churchMap.setOpacity(this.value);
  });
</script>
</body>
</html>
